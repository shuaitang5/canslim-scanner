name: scan-and-publish

# Self-updating CANSLIM scanner.
#  - Scheduled weekday run after US market close, regenerates docs/ and commits
#    it back to main so GitHub Pages republishes automatically (no laptop needed).
#  - Manual runs via the Actions tab let you pick the universe and force-refresh.
# Data is 100% free: yfinance (no key) + SEC EDGAR. SEC requires a User-Agent
# contact string (not verified); it's supplied via the SEC_USER_AGENT env below
# (set the repo secret of the same name to override the non-personal default).

on:
  schedule:
    # 22:00 UTC = ~6pm ET / 3pm PT, after the US cash session closes (21:00 UTC).
    # Mon–Fri only — markets are shut on weekends. GitHub cron is always UTC.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe to scan"
        type: choice
        default: us_all
        options:
          - us_all
          - sp500
      force_refresh:
        description: "Bypass caches and re-fetch every ticker"
        type: boolean
        default: false

# Allow the job to push the regenerated docs/ commit back to the repo.
permissions:
  contents: write

# Never run two publishing jobs at once (they both commit to main).
concurrency:
  group: scan-and-publish
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # us_all (the default) hits thousands of tickers over yfinance + SEC; give it
    # room but stay well under the 6h hard cap. A handful of transient per-ticker
    # abstains is tolerated (canslim scan exits 0 + publishes when under
    # max_abstain_fraction); only genuinely degraded/empty runs block publishing.
    timeout-minutes: 120
    # SEC fair-use needs a contact string in the User-Agent (it isn't verified).
    # canslim.yaml reads it from SEC_USER_AGENT (providers.sec.api_key_env).
    # Set a repo secret SEC_USER_AGENT to override; otherwise a non-personal
    # role-alias default keeps scheduled runs working without leaking an email.
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'canslim-scanner contact@example.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve run parameters
        id: params
        run: |
          # Scheduled (cron) runs carry no dispatch input -> default to full-market
          # us_all, matching the source repo. Manual workflow_dispatch can still
          # override to sp500 via the universe input.
          UNIVERSE="${{ github.event.inputs.universe }}"
          echo "universe=${UNIVERSE:-us_all}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            echo "force_flag=--force-refresh" >> "$GITHUB_OUTPUT"
          else
            echo "force_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Provider health check
        run: canslim check-providers --config canslim.yaml

      - name: Scan
        run: |
          set -o pipefail
          # The GitHub runner shares a datacenter IP, so yfinance throttles
          # (401 "Invalid Crumb") hard on a cold cache — the crumbed market-cap
          # fetch fails for most tickers, which fail-closes them into
          # `unknown_market_cap` and collapses the scanned set far below the real
          # full-market scale. `canslim scan` flags that as DEGRADED (exit != 0).
          #
          # Each pass MONOTONICALLY warms the cap/info/price caches on disk:
          # caps that succeeded stay cached (is_json_fresh -> instant hit next
          # pass) and the price negative-cache skips known-dead tickers, so every
          # re-run re-attempts only the still-unknown caps with a fresh crumb and
          # recovers a few hundred more (observed ~234 -> 472 -> ... per pass).
          # Loop until the scan reports a healthy (exit 0) run or we exhaust the
          # attempt budget — bounded well under the 120-min job timeout.
          #
          # This is NOT a blanket `|| true`: the LAST attempt's exit code is
          # authoritative. If every attempt stays degraded, the scan exits != 0
          # AND the manifest keeps its `_data_quality_warnings`, so the Publish
          # step's guard still refuses to push a throttled/thin page.
          MAX_ATTEMPTS=10
          run_scan() {
            canslim scan \
              --config canslim.yaml \
              --universe "${{ steps.params.outputs.universe }}" \
              ${{ steps.params.outputs.force_flag }}
          }
          attempt=1
          while :; do
            echo "::group::Scan attempt ${attempt}/${MAX_ATTEMPTS}"
            if run_scan; then
              echo "::endgroup::"
              echo "Scan succeeded on attempt ${attempt}."
              break
            fi
            echo "::endgroup::"
            if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
              echo "::warning::Scan still degraded after ${MAX_ATTEMPTS} attempts — letting the publish guard decide."
              exit 1   # authoritative failure; manifest warnings block publish anyway
            fi
            echo "::warning::Scan attempt ${attempt} came back degraded — re-running with warmed caches + fresh crumbs."
            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Publish to docs/
        # The degraded-report guard inside `publish` is the real safety net: it
        # refuses to publish a run whose manifest carries data-quality warnings
        # (empty/throttled), so even a non-zero scan can't push a garbage page.
        run: canslim publish --out out --docs docs

      - name: Commit regenerated docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "Publish ${{ steps.params.outputs.universe }} scan ($(date -u +%Y-%m-%d) UTC) [skip ci]"
            git push
          fi
