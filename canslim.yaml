# canslim.yaml — working config. Secrets can alternatively be set via env vars.

providers:
  yfinance:
    enabled: true
    concurrency: 8
    request_timeout_s: 20
    max_retries: 4
  sec:
    # SEC EDGAR — free, unlimited, authoritative US fundamentals.
    # The User-Agent (SEC fair-use needs a contact string; it isn't verified) is
    # resolved from env/secret SEC_USER_AGENT first, else a non-personal
    # role-alias default baked into the provider. Never commit a personal email.
    # Override via:  export SEC_USER_AGENT="canslim-scanner you@example.com"
    enabled: true
    api_key_env: SEC_USER_AGENT        # leave api_key unset so the secret/env wins
    concurrency: 5                     # SEC rate limit is ~10 req/sec; we stay under
    request_timeout_s: 20
    max_retries: 4
  fmp:
    enabled: false                     # paid; intentionally disabled — free providers only
    api_key_env: FMP_API_KEY
    daily_budget: 250
    concurrency: 2
    request_timeout_s: 20
    max_retries: 4

cache:
  root: cache
  price_ttl_hours: 20                  # ~daily
  fundamentals_ttl_hours: 168          # weekly
  institutional_ttl_hours: 168

criteria:
  # C — current quarterly EPS
  c_min_yoy: 0.25
  c_require_accelerating: true

  # A — annual EPS
  a_min_annual_yoy: 0.25
  a_required_years: 3
  a_min_roe_pct: 0.17
  a_allow_cagr_fallback: true
  a_leadership_override_enabled: true
  a_leadership_override_min_rs: 0.90
  a_leadership_override_min_pattern_conf: 0.65

  # N — 52-week-high proximity (info only)
  n_max_dist_to_high_pct: 0.15
  n_breakout_pivot_pct: 0.05
  n_breakout_volume_multiple: 1.4

  # S — supply/demand
  s_min_adv10_over_adv50: 1.2
  s_max_float_shares: 1000000000
  s_pattern_override_enabled: true
  s_pattern_override_min_conf: 0.65
  s_pattern_override_patterns:
    - cup_with_handle
    - high_tight_flag
    - three_weeks_tight
    - flat_base

  # L — leader
  l_min_rs_percentile: 0.70

  # I — institutional
  i_require_qoq_nondecrease: true
  i_min_new_positions: 1

  # Pre-filter
  prefilter_min_price: 5.0
  prefilter_min_adv50_usd: 1000000
  prefilter_max_dist_to_52w_high: 0.25
  # Minimum market cap (USD) — must-have floor. Early gate after the cheap
  # shares/cap fetch, before fundamentals. $1B excludes micro/small caps.
  prefilter_min_market_cap_usd: 1000000000

weights:
  c: 1.0
  a: 1.0
  n: 0.5
  s: 1.0
  l: 1.0
  i: 1.0
  m: 0.5

scanner:
  default_universe: us_all             # sp500 | us_all | custom — full-market by default
  # universe_file: tickers.txt         # required when default_universe=custom
  out_dir: out
  max_workers: 16
  generate_pdf: false
  # Fraction of SCANNED tickers allowed to abstain on a transient data-quality
  # hiccup before the run is treated as degraded. Below this it's benign — the
  # scan still publishes. Full-market runs touch thousands of tickers; a handful
  # of transient yfinance abstains must not abort the whole run.
  max_abstain_fraction: 0.05
